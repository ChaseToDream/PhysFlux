<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>物绘流光 PhysFlux · 物理运动轨迹模拟器</title>
  <meta name="description" content="物绘流光 PhysFlux —— 国风文艺理科氛围的在线物理动力学模拟器，实时渲染运动轨迹。" />

  <!-- 内联 SVG favicon：水墨青圆，呼应「物绘流光」主题 -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='12' fill='none' stroke='%23A8B5B0' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23D4A574'/%3E%3C/svg%3E" />

  <!-- 思源宋体（书卷感）+ JetBrains Mono（等宽代码感） -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS v3（本地构建时编译，国风色板见 tailwind.config.js） -->
  <link rel="stylesheet" href="/src/styles/tailwind.css" />
  <link rel="stylesheet" href="/src/styles/theme.css" />
  <link rel="stylesheet" href="/src/styles/style.css" />
</head>
<body class="font-serif bg-ink-50 text-ink-700 dark:bg-ink-900 dark:text-ink-200 transition-colors duration-500">

  <!-- ============ 顶部标题栏 ============ -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-title">
        <h1 class="title-cn">物绘流光</h1>
        <span class="title-en font-mono">PhysFlux</span>
        <span class="title-tag">物理运动轨迹模拟器</span>
      </div>
      <div class="header-actions">
        <!-- 页面导航 -->
        <nav class="page-nav" id="pageNav">
          <button class="nav-btn active" data-page="classic" title="经典物理模型">经典模型</button>
          <button class="nav-btn" data-page="sandbox" title="自由沙盒画布">自由沙盒</button>
        </nav>
        <button id="helpBtn" class="icon-btn" title="使用说明" aria-label="使用说明">
          <span>?</span>
        </button>
        <button id="themeToggle" class="icon-btn" title="切换深浅主题" aria-label="切换主题">
          <span class="theme-icon-light">☾</span>
          <span class="theme-icon-dark">☀</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ============ 页面容器 ============ -->
  <main id="appMain" class="app-main">
    <!-- 经典模型页（原有功能） -->
    <section id="page-classic" class="page page-active">
      <!-- 左侧参数控制面板 -->
      <aside id="leftPanel" class="panel panel-left">
        <div class="panel-section collapsible">
          <h2 class="panel-title collapsible-header" data-target="modelSelectSection">
            <span>题型预设</span><span class="collapse-icon">▾</span>
          </h2>
          <div class="collapsible-body" id="modelSelectSection">
            <select id="modelSelect" class="select-input">
              <option value="projectile">平抛运动</option>
              <option value="freefall">自由落体</option>
              <option value="circular">圆周运动</option>
              <option value="gravity">万有引力</option>
              <option value="collision">弹性碰撞</option>
              <option value="uniform">匀变速直线</option>
            </select>
          </div>
        </div>

        <div class="panel-section collapsible">
          <h2 class="panel-title collapsible-header" data-target="paramControlsSection">
            <span>力学参数</span><span class="collapse-icon">▾</span>
          </h2>
          <div class="collapsible-body" id="paramControlsSection">
            <div id="paramControls" class="param-list"></div>
          </div>
        </div>

        <div class="panel-section collapsible">
          <h2 class="panel-title collapsible-header" data-target="customParamsSection">
            <span>自定义物理参数</span><span class="collapse-icon">▾</span>
          </h2>
          <div class="collapsible-body" id="customParamsSection">
            <div id="customParamsPanel"></div>
          </div>
        </div>

        <div class="panel-section collapsible">
          <h2 class="panel-title collapsible-header" data-target="objectLibrarySection">
            <span>模拟物品库</span><span class="collapse-icon">▾</span>
          </h2>
          <div class="collapsible-body" id="objectLibrarySection">
            <div id="objectLibraryPanel"></div>
          </div>
        </div>

        <div class="panel-section collapsible">
          <h2 class="panel-title collapsible-header" data-target="playerSection">
            <span>播放控制</span><span class="collapse-icon">▾</span>
          </h2>
          <div class="collapsible-body" id="playerSection">
            <div class="player-controls">
              <button id="btnPlay" class="btn btn-primary" title="播放/暂停">▶ 播放</button>
              <button id="btnStep" class="btn" title="单步推演">⏭ 单步</button>
              <button id="btnReset" class="btn" title="重置初始状态">↺ 重置</button>
              <button id="btnClear" class="btn" title="清除轨迹">✕ 清除</button>
              <button id="btnExport" class="btn" title="导出运动图像">⤓ 导出PNG</button>
              <button id="btnRecord" class="btn" title="录制 WebM 动画">● 录制</button>
            </div>
          </div>
        </div>

        <div class="panel-section collapsible">
          <h2 class="panel-title collapsible-header" data-target="presetSection">
            <span>方案管理</span><span class="collapse-icon">▾</span>
          </h2>
          <div class="collapsible-body" id="presetSection">
            <div class="preset-controls">
              <button id="btnSavePreset" class="btn btn-outline">保存当前方案</button>
              <select id="presetSelect" class="select-input mt-2">
                <option value="">— 选择已保存方案 —</option>
              </select>
              <button id="btnLoadPreset" class="btn btn-outline mt-2">载入方案</button>
              <button id="btnDeletePreset" class="btn btn-ghost mt-2">删除方案</button>
              <hr class="divider" />
              <button id="btnExportScene" class="btn btn-outline">导出场景文件</button>
              <button id="btnImportScene" class="btn btn-outline">导入场景文件</button>
              <input type="file" id="sceneFileInput" accept=".json" hidden />
            </div>
          </div>
        </div>
      </aside>

      <!-- 中央可视化画布 -->
      <section class="canvas-wrap">
        <canvas id="mainCanvas" class="main-canvas"></canvas>
        <div id="hoverTip" class="hover-tip" hidden></div>
        <div class="canvas-badge font-mono" id="canvasBadge">t = 0.00 s</div>
        <div id="recordIndicator" class="record-indicator" hidden>
          <span class="rec-dot"></span>录制中 <span id="recTime">00:00</span>
        </div>
      </section>

      <!-- 右侧数据面板 -->
      <aside id="rightPanel" class="panel panel-right">
        <div class="panel-section">
          <h2 class="panel-title">实时数据</h2>
          <div class="data-table-wrap">
            <table class="data-table font-mono">
              <thead>
                <tr><th>物体</th><th>位移(m)</th><th>速度(m/s)</th><th>加速度(m/s²)</th></tr>
              </thead>
              <tbody id="dataTableBody"></tbody>
            </table>
          </div>
        </div>

        <div class="panel-section">
          <h2 class="panel-title">位移 - 时间</h2>
          <canvas id="chartST" class="mini-chart"></canvas>
        </div>

        <div class="panel-section">
          <h2 class="panel-title">速度 - 时间</h2>
          <canvas id="chartVT" class="mini-chart"></canvas>
        </div>

        <div class="panel-section">
          <h2 class="panel-title">能量变化</h2>
          <canvas id="chartEnergy" class="mini-chart"></canvas>
        </div>
      </aside>
    </section>

    <!-- 自由沙盒页（新功能） -->
    <section id="page-sandbox" class="page page-sandbox">
      <!-- 沙盒内容由 sandbox 页面模块动态构建 -->
    </section>
  </main>

  <!-- ============ 底部说明区 ============ -->
  <footer class="app-footer">
    <div class="footer-inner">
      <div class="footer-formula">
        <span class="footer-label">当前公式</span>
        <code id="formulaText" class="formula-code font-mono"></code>
      </div>
      <div class="footer-explain">
        <span class="footer-label">题型解析</span>
        <p id="explainText" class="explain-text"></p>
      </div>
    </div>
  </footer>

  <!-- 移动端面板切换按钮 -->
  <button id="mobilePanelToggle" class="mobile-panel-toggle" aria-label="切换面板">☰</button>

  <!-- 帮助说明模态框 -->
  <div id="helpModal" class="help-modal" hidden>
    <div class="help-modal-overlay" id="helpOverlay"></div>
    <div class="help-modal-content">
      <div class="help-modal-header">
        <h3>物绘流光 · 使用说明</h3>
        <button id="helpClose" class="help-close" aria-label="关闭">✕</button>
      </div>
      <div class="help-modal-body" id="helpBody"></div>
    </div>
  </div>

  <!-- 录制提示 Toast -->
  <div id="toast" class="toast" hidden></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
